<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cliente CRUD Sprint Historias</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1b1f24;
      --muted: #5f6b7a;
      --line: #dde3ea;
      --primary: #1d4ed8;
      --danger: #dc2626;
      --ok: #15803d;
      --warn: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }
    .header {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 18px;
    }
    .header h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .header p {
      margin: 0;
      color: var(--muted);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    input {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      min-width: 140px;
      flex: 1;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
      color: white;
      background: var(--primary);
      font-weight: 600;
    }
    button.delete {
      background: var(--danger);
    }
    button.secondary {
      background: #475569;
    }
    .status {
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      background: #e2e8f0;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }
    .status.ok {
      background: #dcfce7;
      color: var(--ok);
      border-color: #86efac;
    }
    .status.warn {
      background: #ffedd5;
      color: var(--warn);
      border-color: #fdba74;
    }
    .status.error {
      background: #fee2e2;
      color: var(--danger);
      border-color: #fca5a5;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      text-align: left;
    }
    pre {
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      overflow: auto;
      max-height: 320px;
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="header">
      <h1>Cliente CRUD - Sprint Historias</h1>
      <p>Endpoint base: <strong>/api/sprint-historias/</strong></p>
    </section>

    <section id="status" class="status">Listo para operar.</section>

    <section class="card">
      <h2>Listado de registros (GetAll)</h2>
      <div class="row">
        <button id="btnGetAll">Actualizar listado</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>id_sprint</th>
            <th>id_historia</th>
            <th>fecha_asignacion</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="3">Sin datos cargados</td></tr>
        </tbody>
      </table>
    </section>

    <section class="grid">
      <div class="card">
        <h2>GetById</h2>
        <div class="row">
          <input id="idGet" type="number" placeholder="id_sprint" />
          <button id="btnGetById" class="secondary">Consultar</button>
        </div>
      </div>

      <div class="card">
        <h2>Crear (POST)</h2>
        <div class="row">
          <input id="idSprint" type="number" placeholder="id_sprint" />
          <input id="idHistoria" type="number" placeholder="id_historia" />
        </div>
        <div class="row">
          <button id="btnPost">Crear registro</button>
        </div>
      </div>

      <div class="card">
        <h2>Actualizar (PATCH)</h2>
        <div class="row">
          <input id="idPatch" type="number" placeholder="id_sprint objetivo" />
          <input id="newHistoria" type="number" placeholder="nuevo id_historia" />
        </div>
        <div class="row">
          <button id="btnPatch" class="secondary">Actualizar registro</button>
        </div>
      </div>

      <div class="card">
        <h2>Eliminar (DELETE)</h2>
        <div class="row">
          <input id="idDelete" type="number" placeholder="id_sprint a eliminar" />
          <button id="btnDelete" class="delete">Eliminar</button>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Respuesta JSON</h2>
      <pre id="output">Sin datos</pre>
    </section>
  </div>

  <script>
    const output = document.getElementById('output');
    const tableBody = document.getElementById('tableBody');
    const statusBox = document.getElementById('status');

    function getCookie(name) {
      const cookies = document.cookie ? document.cookie.split(';') : [];
      for (const cookie of cookies) {
        const trimmed = cookie.trim();
        if (trimmed.startsWith(name + '=')) {
          return decodeURIComponent(trimmed.slice(name.length + 1));
        }
      }
      return null;
    }

    function setStatus(message, kind = '') {
      statusBox.className = `status ${kind}`.trim();
      statusBox.textContent = message;
    }

    function showResult(label, status, data) {
      output.textContent = `${label} | HTTP ${status}\n\n${JSON.stringify(data, null, 2)}`;
      if (status >= 200 && status < 300) {
        setStatus(`${label} ejecutado correctamente (HTTP ${status})`, 'ok');
      } else if (status >= 400 && status < 500) {
        setStatus(`${label} con validación/recurso no encontrado (HTTP ${status})`, 'warn');
      } else {
        setStatus(`${label} falló (HTTP ${status})`, 'error');
      }
    }

    function renderTable(data) {
      const rows = Array.isArray(data) ? data : (data?.results || []);
      if (!rows.length) {
        tableBody.innerHTML = '<tr><td colspan="3">Sin registros</td></tr>';
        return;
      }

      tableBody.innerHTML = rows.map(item => `
        <tr>
          <td>${item.id_sprint ?? ''}</td>
          <td>${item.id_historia ?? ''}</td>
          <td>${item.fecha_asignacion ?? ''}</td>
        </tr>
      `).join('');
    }

    async function request(url, options = {}) {
      try {
        const csrfToken = getCookie('csrftoken');
        const headers = {
          'Content-Type': 'application/json',
          ...(options.headers || {}),
        };
        if (csrfToken) {
          headers['X-CSRFToken'] = csrfToken;
        }

        const response = await fetch(url, {
          headers,
          credentials: 'same-origin',
          ...options,
        });
        let data;
        try {
          data = await response.json();
        } catch {
          data = { detail: 'Respuesta sin JSON' };
        }
        return { status: response.status, data };
      } catch (error) {
        return { status: 0, data: { detail: String(error) } };
      }
    }

    document.getElementById('btnGetAll').addEventListener('click', async () => {
      const { status, data } = await request('/api/sprint-historias/');
      renderTable(data);
      showResult('GET ALL', status, data);
    });

    document.getElementById('btnGetById').addEventListener('click', async () => {
      const id = document.getElementById('idGet').value;
      if (!id) {
        showResult('GET BY ID', 400, { detail: 'Ingresa un id_sprint' });
        return;
      }
      const { status, data } = await request(`/api/sprint-historias/${id}/`);
      showResult('GET BY ID', status, data);
    });

    document.getElementById('btnPost').addEventListener('click', async () => {
      const id_sprint = Number(document.getElementById('idSprint').value);
      const id_historia = Number(document.getElementById('idHistoria').value);

      if (!id_sprint || !id_historia) {
        showResult('POST', 400, { detail: 'Completa id_sprint e id_historia' });
        return;
      }

      const { status, data } = await request('/api/sprint-historias/', {
        method: 'POST',
        body: JSON.stringify({ id_sprint, id_historia }),
      });
      showResult('POST', status, data);
      if (status >= 200 && status < 300) {
        document.getElementById('idSprint').value = '';
        document.getElementById('idHistoria').value = '';
        const listResp = await request('/api/sprint-historias/');
        renderTable(listResp.data);
      }
    });

    document.getElementById('btnPatch').addEventListener('click', async () => {
      const id = Number(document.getElementById('idPatch').value);
      const nuevo = Number(document.getElementById('newHistoria').value);

      if (!id || !nuevo) {
        showResult('PATCH', 400, { detail: 'Completa id_sprint objetivo y nuevo id_historia' });
        return;
      }

      const { status, data } = await request(`/api/sprint-historias/${id}/`, {
        method: 'PATCH',
        body: JSON.stringify({ id_historia: nuevo }),
      });
      showResult('PATCH', status, data);
      if (status >= 200 && status < 300) {
        const listResp = await request('/api/sprint-historias/');
        renderTable(listResp.data);
      }
    });

    document.getElementById('btnDelete').addEventListener('click', async () => {
      const id = Number(document.getElementById('idDelete').value);
      if (!id) {
        showResult('DELETE', 400, { detail: 'Ingresa id_sprint a eliminar' });
        return;
      }

      const { status, data } = await request(`/api/sprint-historias/${id}/`, {
        method: 'DELETE',
      });
      showResult('DELETE', status, data || {});
      if (status >= 200 && status < 300) {
        document.getElementById('idDelete').value = '';
        const listResp = await request('/api/sprint-historias/');
        renderTable(listResp.data);
      }
    });

    document.getElementById('btnGetAll').click();
  </script>
</body>
</html>
